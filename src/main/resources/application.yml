server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gayrimenkul_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: #şifre yaz
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Burayı 'never' yaptım, çünkü data.sql içindeki bir hata projeyi patlatıyor.
  sql:
    init:
      mode: never

logging:
  level:
    com.gayrimenkul.system: DEBUG
    org.hibernate.SQL: DEBUG